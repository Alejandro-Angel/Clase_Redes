<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso al sistema</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
  <div class="bg-blur bg-one"></div>
  <div class="bg-blur bg-two"></div>
  <div class="bg-grid"></div>

  <main class="login-wrapper">
    <section class="glass-card login-card">
      <div class="eyebrow">Sistema embebido</div>
      <h1>Control de motor con LM35</h1>
      <p class="subtitle">
        acceso protegido al panel de monitoreo y control visual
      </p>

      {% if error %}
      <div class="alert-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('login') }}" class="login-form">
        <label for="username">usuario</label>
        <input type="text" id="username" name="username" placeholder="ingresa tu usuario" required>

        <label for="password">contraseña</label>
        <div class="password-wrap">
          <input type="password" id="password" name="password" placeholder="ingresa tu contraseña" required>
          <button type="button" class="show-pass-btn" onclick="togglePassword()">ver</button>
        </div>

        <button type="submit" class="primary-btn">iniciar sesión</button>
      </form>
    </section>
  </main>

  <script>
    function togglePassword() {
      const passwordInput = document.getElementById("password");
      passwordInput.type = passwordInput.type === "password" ? "text" : "password";
    }
  </script>
</body>
</html>
